# Production-specific configuration
# Активируется при установке SPRING_PROFILES_ACTIVE=prod

# CORS configuration для production
# ВАЖНО: не используйте wildcard паттерны (* или ?) в production
# Указывайте только явные домены для предотвращения CSRF атак
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://swarmhost.tech/notebox}

# Включить secure cookies в production
server:
  servlet:
    session:
      cookie:
        secure: ${COOKIE_SECURE:true}

# Отключить demo mode в production по умолчанию
demo:
  mode:
    enabled: ${DEMO_MODE_ENABLED:false}
