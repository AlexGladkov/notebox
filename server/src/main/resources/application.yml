spring:
  application:
    name: notebox-server

  main:
    # Required for Exposed Spring Boot Starter bean override
    allow-bean-definition-overriding: true

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notebox}?TimeZone=UTC
    username: ${POSTGRES_USER:notebox}
    password: ${POSTGRES_PASSWORD:notebox}
    driver-class-name: org.postgresql.Driver

  exposed:
    generate-ddl: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  url: ${SERVER_URL:http://localhost:8080}
  servlet:
    session:
      cookie:
        same-site: lax
        secure: ${COOKIE_SECURE:false}
        http-only: true

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}
  bucket: ${S3_BUCKET:notebox-files}
  region: ${S3_REGION:us-east-1}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  apple:
    client-id: ${APPLE_CLIENT_ID:}
    client-secret: ${APPLE_CLIENT_SECRET:}
    team-id: ${APPLE_TEAM_ID:}

demo:
  mode:
    enabled: ${DEMO_MODE_ENABLED:true}

push:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@notebox.app}
