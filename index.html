<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteBox</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Умный блокнот для организации заметок">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="NoteBox">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

    <!-- Theme script -->
    <script>
      // Применяем тему до загрузки Vue для предотвращения FOUC
      (function() {
        try {
          const theme = localStorage.getItem('notebox-theme') || 'system';
          const isDark = theme === 'dark' ||
            (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage недоступен, ничего не делаем
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
